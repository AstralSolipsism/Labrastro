modes:
  active: coder
  profiles:
    coder:
      description: Default coding mode with full tool access.
      tools:
        - '*'
      prompt_append: Prioritize making concrete code changes and verifying them with commands/tests when appropriate.

remote_exec:
  enabled: true
  host_mode: true
  relay_bind: 0.0.0.0:8765
  bootstrap_token_ttl_sec: 120
  peer_token_ttl_sec: 3600
  heartbeat_interval_sec: 10
  heartbeat_timeout_sec: 30
  default_tool_timeout_sec: 30
  shell_timeout_sec: 120

auth:
  enabled: true
  token_secret: ${LABRASTRO_AUTH_TOKEN_SECRET}
  store_backend: auto
  store_path: .rcoder/auth.json
  password_min_length: 6
  password_max_length: 256
  login_rate_limit_count: 5
  login_rate_limit_window_sec: 900
  superadmins:
    - username: ${LABRASTRO_SUPERADMIN_USERNAME}
      password: ${LABRASTRO_SUPERADMIN_PASSWORD}

run_limits:
  max_running_agents: 4
  max_shells_per_agent: 1

runtime_profiles:
  environment_local:
    executor: reuleauxcoder
    execution_location: local_workspace
    runtime_home_policy: per_task
    approval_mode: full

agent_registry:
  agents:
    environment_configurator:
      name: Environment Configurator
      description: Checks and configures the local workspace environment from the server manifest.
      runtime_profile: environment_local
      dispatch:
        profile: Best for checking and configuring local workspace environment components from the server manifest.
        examples:
          - Check whether required CLI, MCP, and Skill components are available.
          - Configure missing local tools declared by the environment manifest.
        avoid:
          - General implementation and code review tasks.
      capability_refs:
        - environment

capability_packages:
  environment:
    name: Environment Tools
    description: Read and configure the local workspace environment manifest.
    source:
      type: builtin
    components: []

capability_components: {}

persistence:
  backend: auto
  database_url: ${LABRASTRO_DATABASE_URL}
  auto_migrate: true
  runtime_enabled: true
  sessions_enabled: true

sandbox_provider:
  type: docker
  host_base_url: ${LABRASTRO_SANDBOX_HOST_BASE_URL}
  worker_image: labrastro-host:test
  workspace_volume_root: ezcode-workspaces
  network: ezcode-net
  idle_ttl_seconds: 3600
  retention_days: 0

session:
  auto_save: true

skills:
  enabled: true
  scan_project: true
  scan_user: false
  disabled: []

meta:
  workspace_bootstrapped: true
