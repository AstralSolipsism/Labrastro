services:
  labrastro-host:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        LABRASTRO_BUILD_REVISION: ${LABRASTRO_BUILD_REVISION:-unknown}
    image: labrastro-host:test
    container_name: labrastro-host
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8765:8765"
    volumes:
      - ../.rcoder:/app/.rcoder
      - /var/run/docker.sock:/var/run/docker.sock
    tty: true
    stdin_open: true
    networks:
      - labrastro-net
      - labrastro-data-net

networks:
  labrastro-net:
    name: labrastro-net
  labrastro-data-net:
    name: ${LABRASTRO_DOCKER_EXTERNAL_NETWORK:-1panel-network}
    external: true
